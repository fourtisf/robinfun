<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  *{margin:0;box-sizing:border-box}
  html,body{background:#080b0a;overflow:hidden}
  .pfp{position:absolute;top:0;left:0;width:800px;height:800px;display:grid;place-items:center;
    background:
      radial-gradient(circle at 50% 45%, rgba(198,242,60,.26), rgba(198,242,60,.05) 46%, transparent 66%),
      linear-gradient(155deg,#141e0e 0%,#0b110a 52%,#070a09 100%);}
  .ring{position:absolute;border-radius:50%}
  .r1{inset:44px;border:2px solid rgba(198,242,60,.22)}
  .r2{inset:88px;border:2px solid rgba(198,242,60,.10)}
  svg{filter:drop-shadow(0 10px 46px rgba(198,242,60,.5));position:relative}
</style></head><body>

</body></html>
