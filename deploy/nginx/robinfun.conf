# Robinfun — nginx server block (reference copy).
# bootstrap.sh writes this same config to /etc/nginx/sites-available/robinfun.conf,
# then certbot --nginx rewrites it to add the TLS listener + HTTP→HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name robinfun.io www.robinfun.io;

    root /var/www/robinfun;
    index index.html;

    # Owner-only admin console. Clean URL /admin → admin.html (the page itself
    # is noindex and every write is gated on-chain by factory.owner()).
    location = /admin {
        try_files /admin.html =404;
        add_header Cache-Control "no-cache";
    }

    # Single-page app: serve real files as-is; fall back to index.html so
    # deep-links (/token/<id>, /profile/<addr>) resolve on a fresh page load
    # and the client router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Keep the HTML fresh so redeploys show up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /admin.html {
        add_header Cache-Control "no-cache";
    }
    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Baseline security headers (no CSP — the page uses inline <style>/<script>
    # and loads Google Fonts, which a strict CSP would break).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
