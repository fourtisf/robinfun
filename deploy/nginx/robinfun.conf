# Robinfun — nginx server block (reference copy).
# bootstrap.sh writes this same config to /etc/nginx/sites-available/robinfun.conf,
# then certbot --nginx rewrites it to add the TLS listener + HTTP→HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name robinfun.io www.robinfun.io;

    root /var/www/robinfun;
    index index.html;

    # Owner-only admin console. Clean URL /admin → admin.html (the page itself
    # is noindex, gated on-chain by factory.owner() + an in-page passphrase lock
    # and wallet-signature ownership proof). These headers are the server-side
    # half of the hardening — CSP/frame-ancestors/referrer are NOT enforceable
    # from a <meta> tag, so they must live here.
    #
    # OPTIONAL (recommended) real gate — uncomment to require a server password
    # before the page loads at all:
    #   auth_basic "Robinfun Admin";
    #   auth_basic_user_file /etc/nginx/.robinfun_admin;   # htpasswd -c to create
    location = /admin {
        try_files /admin.html =404;
        add_header Cache-Control "no-cache" always;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src https://rpc.mainnet.chain.robinhood.com https://api.coingecko.com https://api.coinbase.com; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; object-src 'none'" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # Single-page app: serve real files as-is; fall back to index.html so
    # deep-links (/token/<id>, /profile/<addr>) resolve on a fresh page load
    # and the client router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Keep the HTML fresh so redeploys show up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    # Force the console through the hardened /admin location. Serving the raw
    # /admin.html URL directly would emit it WITHOUT the CSP / X-Frame-Options
    # headers set on /admin (nginx does not merge add_header across levels), so
    # the page would be framable — redirect instead.
    location = /admin.html {
        return 301 /admin;
    }
    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Baseline security headers (no CSP — the page uses inline <style>/<script>
    # and loads Google Fonts, which a strict CSP would break).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
